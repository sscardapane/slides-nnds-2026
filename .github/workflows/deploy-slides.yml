name: Deploy slides to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - html/**
      - .github/workflows/deploy-slides.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: html
        run: npm ci

      - name: Build every deck under html/slides/*.md
        working-directory: html
        run: |
          set -e
          mkdir -p dist
          {
            echo "<!doctype html><html><head><meta charset=\"utf-8\"><title>NNDS 2026 slides</title></head><body>"
            echo "<h1>NNDS 2026 slides</h1><ul>"
          } > dist/index.html
          for f in slides/*.md; do
            name=$(basename "$f" .md)
            npx slidev build "$f" --base "/slides-nnds-2026/$name/" --out "$PWD/dist/$name"
            echo "<li><a href=\"./$name/\">$name</a></li>" >> dist/index.html
          done
          echo "</ul></body></html>" >> dist/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: html/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
